<!DOCTYPE html>
<html>
  <head>
    <title>myntra.com</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
  </head>
  <body>
    <div class="header sticky">
      <div>
        <a href="/"
          ><img
            src="https://cdn.freelogovectors.net/wp-content/uploads/2021/02/myntra-logo-freelogovectors.net_.png"
            alt="logo"
        /></a>
      </div>
      <div class="categories">
        <ul>
          <li class="dropdown-content">
            <a href="/mens">Men</a>
            <!-- <ul class="dropdown-men">
                      <li><a href="#">Link 1</a></li>
                      <li><a href="#">Link 2</a></li>
                      <li><a href="#">Link 3</a></li>
                    </ul> -->
          </li>
          <li><a href="/women">Women</a></li>
          <li><a href="/kids">Kids</a></li>
          <li><a href="/home_living">Home & Living</a></li>
          <li><a href="/beauty">Beauty</a></li>
        </ul>
      </div>

      <!-- Search Div -->
      <div class="search-div">
        <img
          id="searchpng"
          src="https://image.flaticon.com/icons/png/128/49/49116.png"
          alt=""
        />

        <input type="text" placeholder="Search for products, brands and more" />
      </div>

      <div class="nav-last">
        <div>
          <a href="/login">
            <img
              id="svg"
              src="https://www.svgrepo.com/show/198180/user-profile.svg"
              alt=""
            />
          </a>

          <div>Profile</div>
        </div>

        <div>
          <a href="/wishlist">
            <img
              id="svg"
              src="https://www.svgrepo.com/show/14970/heart.svg"
              alt=""
            />
          </a>

          <div>Wishlist</div>
        </div>

        <div>
          <a href="/bag">
            <img
              id="svg"
              src="https://www.svgrepo.com/show/17522/bag.svg"
              alt=""
            />
          </a>

          <div>Bag</div>
        </div>
      </div>
    </div>

    <div id="loginbox">
      <img
        src="https://assets.myntassets.com/f_webp,dpr_1.5,q_60,w_400,c_limit,fl_progressive/assets/images/2021/7/14/1db28809-f3db-48b1-b303-d937716565661626257521634-Banner_Hamburger--2---1-.jpg"
      />
      <div class="loginbody">
        <div class="loginheader">
          Login <span id="smallheader">Or </span>Signup
        </div>
        <form id="login" action="/login" method="POST">
          <input type="text" id="mobileno" name="mobileno" placeholder="Mobile Number" required /><br />
          <input type="password" id="password" name="password" placeholder="Enter Password" required />
          <button type="submit" class="continue">Continue</button>
        </form>
        <p>
          By continuing I agree to the<span class="smallhead">
            Terms of Use </span
          >&<span id="small"> Privacy Policy</span>
        </p>
        <p>Don't have account <a href="/signin">Signup</a></p>
        <div id="alert">
    {% if error %}
        {{ error }}
    {% endif %}
      </div>

      </div>
    </div>
  </body>
</html>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>
