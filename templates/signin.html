<!DOCTYPE html>
<html>
  <head>
    <title>myntra.com</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/signup.css') }}">
  </head>
  <body>
    <div class="header sticky">
      <div>
        <a href="/home.html"
          ><img
            src="https://cdn.freelogovectors.net/wp-content/uploads/2021/02/myntra-logo-freelogovectors.net_.png"
            alt="logo"
        /></a>
      </div>
      <div class="categories">
        <ul>
          <li class="dropdown-content">
            <a href="/mens.html">Men</a>
            <!-- <ul class="dropdown-men">
                      <li><a href="#">Link 1</a></li>
                      <li><a href="#">Link 2</a></li>
                      <li><a href="#">Link 3</a></li>
                    </ul> -->
          </li>
          <li><a href="">Women</a></li>
          <li><a href="">Kids</a></li>
          <li><a href="">Home & Living</a></li>
          <li><a href="">Beauty</a></li>
        </ul>
      </div>

      <!-- Search Div -->
      <div class="search-div">
        <img
          id="searchpng"
          src="https://image.flaticon.com/icons/png/128/49/49116.png"
          alt=""
        />

        <input type="text" placeholder="Search for products, brands and more" />
      </div>

      <div class="nav-last">
        <div>
          <a href="">
            <img
              id="svg"
              src="https://www.svgrepo.com/show/198180/user-profile.svg"
              alt=""
            />
          </a>

          <div>Profile</div>
        </div>

        <div>
          <a href="">
            <img
              id="svg"
              src="https://www.svgrepo.com/show/14970/heart.svg"
              alt=""
            />
          </a>

          <div>Wishlist</div>
        </div>

        <div>
          <a href="">
            <img
              id="svg"
              src="https://www.svgrepo.com/show/17522/bag.svg"
              alt=""
            />
          </a>

          <div>Bag</div>
        </div>
      </div>
    </div>

    <div id="signinbox">
      <div id="textbox">
        <div id="signintext">
          <p class="signinheader">CREATE A NEW ACCOUNT</p>
        </div>
            <form id="formContainer" action="/signin" method="POST">
              <input type="text" name="name" placeholder="Full Name" required />
        <input type="text" name="username" placeholder="Username" required />

        <input
        type="text"
        name="mobileno"
        placeholder="Mobile Number"
        required
        />

        <input type="text" name="email" placeholder="Email id" required />

        <input
        type="password"
        name="password"
        placeholder="Password"
        required
        /><div class="message-box">

    {% if error %}
    <p class="error-msg">{{ error }}</p>
    {% endif %}

    {% if success %}
    <p class="success-msg">{{ success }}</p>
    {% endif %}

    {% if password_strength %}
    <p class="strength-msg">{{ password_strength }}</p>
    {% endif %}

</div>
              <input
           type="date"
            name="birthdate"
            placeholder="Birth Date"
            required
          />

        <button type="submit" class="signinbtn">SIGN UP</button>
        </form>
        <div id="alert"></div>
        <br />
       <br />
        <p style="text-align: center">
          Already have an account? <a href="/login"> click here </a>
        </p>
      </div>
    </div>
  </body>
</html>
